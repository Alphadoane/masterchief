<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVDP Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #e2e8f0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .findings-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--glass-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .severity-high {
            color: var(--accent-red);
            font-weight: 600;
        }

        .severity-info {
            color: var(--accent-blue);
        }

        .tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>MAVDP <span style="font-weight: 300; opacity: 0.5;">| Discovery Dashboard</span></h1>
        <div class="tag">UPTIME: 99.9%</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">TOTAL FINDINGS</div>
            <div id="stat-findings" class="stat-val">242</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ACTIVE ENGINES</div>
            <div id="stat-engines" class="stat-val">12</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">RISK AVERAGE</div>
            <div id="stat-risk" class="stat-val">8.4</div>
        </div>
    </div>

    <h2>Real-time Telemetry</h2>
    <table class="findings-table">
        <thead>
            <tr>
                <th>TIME</th>
                <th>ENGINE</th>
                <th>TARGET</th>
                <th>SEVERITY</th>
                <th>VULN_TYPE</th>
            </tr>
        </thead>
        <tbody id="telemetry-body">
            <!-- Data will be populated by fetchStats() -->
            <tr id="no-data">
                <td colspan="5" style="text-align: center; opacity: 0.5;">Waiting for telemetry...</td>
            </tr>
        </tbody>
    </table>

    <script>
        const API_URL = 'http://localhost:8000';

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                if (!res.ok) throw new Error('API unstable');
                const data = await res.json();

                document.getElementById('stat-findings').innerText = data.total_findings;
                document.getElementById('stat-engines').innerText = data.active_engines;

                // Update findings table
                const findingsRes = await fetch(`${API_URL}/findings?limit=10`);
                if (!findingsRes.ok) return;
                const findings = await findingsRes.json();

                const body = document.getElementById('telemetry-body');
                if (findings.length > 0) {
                    body.innerHTML = '';
                    findings.forEach(f => {
                        const row = document.createElement('tr');
                        const severityClass = f.severity_estimate === 'CRITICAL' || f.severity_estimate === 'HIGH' ? 'severity-high' : 'severity-info';
                        row.innerHTML = `
                            <td>${new Date(f.timestamp).toLocaleTimeString()}</td>
                            <td><span class="tag">${f.engine_type}</span></td>
                            <td>${f.target_id}</td>
                            <td><span class="${severityClass}">${f.severity_estimate}</span></td>
                            <td>${f.metadata?.reason || 'Discovery'}</td>
                        `;
                        body.appendChild(row);
                    });
                }
            } catch (e) {
                console.warn("API unreachable - checking backend status...");
            }
        }
        setInterval(fetchStats, 5000);
        fetchStats(); // Initial fetch
    </script>
</body>

</html>
