version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  brain:
    build:
      context: ./orchestration_layer
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

